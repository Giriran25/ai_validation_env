name: ai-validation-env

version: 1.0.0

description: >
  An AI Decision Validation Environment that evaluates and corrects decisions made by AI systems.
  It simulates real-world scenarios such as loan approval, hiring decisions, and code validation.

entrypoint: main:app

tasks:
  - id: easy
    description: Validate a loan approval decision based on financial eligibility.

  - id: medium
    description: Evaluate and correct a hiring decision considering flexible company policies.

  - id: hard
    description: Detect and fix incorrect logic in AI-generated code.

observation_space:
  type: object
  properties:
    decision_text:
      type: string
    context:
      type: string

action_space:
  type: object
  properties:
    decision:
      type: string
      enum: [approve, reject, modify]
    corrected_output:
      type: string

reward:
  type: float
  range: [0.0, 1.0]

api:
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state